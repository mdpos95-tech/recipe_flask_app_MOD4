{% extends "base.html" %}
{% block content %}
<h1>All Recipes</h1>

{% for recipe in recipes %}
<div class="recipe">
    <h2>{{ recipe.title }}</h2>
    <p><strong>Category:</strong> {{ recipe.category }}</p>
    <p><strong>Ingredients:</strong><br>{{ recipe.ingredients }}</p>
    <p><strong>Instructions:</strong><br>{{ recipe.instructions }}</p>
   </div>
   {% endfor %}
{% endblock %}
