{% extends "base.html" %}
{% block content %}
    <h1>My Favorite Recipes</h1>
   {% for recipe in favorites %}
   <p>
    <a href="{{ url_for('recipe_detail',recipe_id=recipe.id) }}">{{ recipe.title }}</a>
   </p>
    {% else %}
    <p>You have no favorite recipes yet.</p>
    {% endfor %}
{% endblock %}
