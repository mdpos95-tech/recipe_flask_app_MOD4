{% extends "base.html" %}
{% block content %}
    <h1>My Favorite Recipes</h1>
   {% for recipe in favorites %}
   <p>
    <a href="{{ url_for('recipe_detail',recipe_id=recipe.id) }}">{{ recipe.title }}</a>
   </p>

   <form action="{{ url_for('remove_favorite', recipe_id=recipe.id) }}" method="POST"><button type="submit">Remove from Favorites</button>
   </form>
    {% else %}
    <p>You have no favorite recipes yet.</p>
    {% endfor %}
{% endblock %}
